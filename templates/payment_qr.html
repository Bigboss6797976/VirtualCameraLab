<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全支付</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #26A17B;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: bold;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        .amount {
            font-size: 48px;
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }
        .qr-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .qr-container img {
            width: 200px;
            height: 200px;
        }
        .address {
            font-size: 12px;
            color: #666;
            word-break: break-all;
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .btn {
            background: #26A17B;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: 15px;
            color: #27ae60;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">U</div>
        <h1>USDT 转账</h1>
        <div class="amount">$<span id="amount">100.00</span></div>
        <div class="qr-container">
            <img id="qr-code" src="" alt="支付二维码">
            <div class="address" id="address">T9yD14Nj9j7xAB4dbGeiX9h8unkKHxuWwb</div>
        </div>
        <button class="btn" onclick="copyAddress()">复制地址</button>
        <div class="security-badge">
            <span>🔒</span>
            <span>安全加密传输</span>
        </div>
    </div>
    <script>
        function copyAddress() {
            const addr = document.getElementById('address').textContent;
            navigator.clipboard.writeText(addr);
            alert('地址已复制: ' + addr);
        }

        // 动态设置金额和地址
        const params = new URLSearchParams(window.location.search);
        if (params.get('amount')) {
            document.getElementById('amount').textContent = params.get('amount');
        }
        if (params.get('address')) {
            document.getElementById('address').textContent = params.get('address');
        }
    </script>
</body>
</html>

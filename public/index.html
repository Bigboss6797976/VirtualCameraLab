<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高级能量码全功能生成器 v3.1 - HD科技</title>
    <style>
        :root { --bg-color: #0b0e14; --panel-bg: #1a1f2c; --text-color: #abb2bf; --accent-color: #1677ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 12px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: #fff; font-size: 20px; margin: 10px 0 15px 0; font-weight: 600; text-align: center; }
        
        .container { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 1200px; justify-content: center; }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: 16px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .preview-panel { display: flex; flex-direction: column; align-items: center; }
        
        h2 { color: #fff; font-size: 15px; margin-bottom: 14px; border-bottom: 1px solid #2e374a; padding-bottom: 8px; font-weight: 600; }
        
        /* 响应式：电脑端并排，苹果/安卓端堆叠 */
        @media (min-width: 768px) {
            body { padding: 24px; }
            h1 { font-size: 24px; margin-bottom: 25px; }
            .container { flex-direction: row; align-items: flex-start; }
            .panel { flex: 1; min-width: 400px; padding: 24px; }
            .preview-panel { position: sticky; top: 24px; max-width: 450px; }
        }

        .form-group { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        label { font-size: 13px; font-weight: 600; color: #8a95a5; }
        
        /* 交互组件适配 */
        .drop-zone { background: #11141e; border: 2px dashed #3b455c; color: #8a95a5; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .drop-zone:hover { border-color: var(--accent-color); color: #fff; }
        
        select, input[type="text"] { background: #11141e; border: 1px solid #2e374a; color: #fff; padding: 10px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1xl 1xl; gap: 10px; }
        @media (min-width: 400px) { .grid-2 { grid-template-columns: 1fr 1fr; } }

        input[type="range"] { background: #11141e; border: 1px solid #2e374a; height: 38px; padding: 0 10px; border-radius: 8px; width: 100%; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--accent-color); cursor: pointer; }
        
        /* 开关组件 */
        .switch-row { display: flex; align-items: center; justify-content: space-between; background: #11141e; padding: 10px; border-radius: 8px; border: 1px solid #2e374a; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3b455c; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn { background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; margin-top: 10px; }
        .btn-danger { background: #ff4d4f; padding: 4px 8px; font-size: 11px; border-radius: 4px; border: none; color: #fff; cursor: pointer; }

        .canvas-container { position: relative; width: 100%; max-width: 360px; border-radius: 14px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.5); margin: 15px 0; }
        canvas { width: 100%; height: auto; display: block; background: #fff; }
    </style>
</head>
<body>

<h1>能量码全功能生成器 v3.1</h1>
<div class="container">
    <div class="panel">
        <h2>1. 基础资源上传</h2>
        <div class="form-group">
            <div class="label-row"><label>二维码图片 (支持拖拽/点击)</label><button class="btn-danger" onclick="clearFile('qr')">清除</button></div>
            <div class="drop-zone" id="qrZone" onclick="document.getElementById('qrInput').click()">点击或拖拽二维码到这里</div>
            <input type="file" id="qrInput" accept="image/*" style="display:none">
        </div>
        <div class="form-group">
            <div class="label-row"><label>头像图片叠加</label><button class="btn-danger" onclick="clearFile('avatar')">清除</button></div>
            <div class="drop-zone" id="avatarZone" onclick="document.getElementById('avatarInput').click()">点击或拖拽头像到这里</div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none">
        </div>

        <h2>2. 视觉色彩与外观设置</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>二维码主色</label>
                <select id="qrColor">
                    <option value="#4682B4">钢青 (Steel Blue)</option>
                    <option value="#DFFF00">酸黄 (Acid Yellow)</option>
                    <option value="#00FFFF">青色 (Cyan)</option>
                    <option value="#FFFFFF" selected>白色 (White)</option>
                    <option value="#FF0000">红色 (Red)</option>
                    <option value="#11141e">深色 (Dark)</option>
                </select>
            </div>
            <div class="form-group">
                <label>背景颜色</label>
                <select id="bgColor">
                    <option value="#1677ff" selected>经典蓝</option>
                    <option value="#2e374a">暗黑灰</option>
                    <option value="#52b324">森林绿</option>
                    <option value="#ff4d4f">活力红</option>
                    <option value="#e6a23c">警告橙</option>
                    <option value="#0b0e14">极夜黑</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label>边框宽度 (0-24px)</label>
                <input type="range" id="borderWidth" min="0" max="24" value="12">
            </div>
            <div class="form-group">
                <label>圆角大小 (0-32px)</label>
                <input type="range" id="borderRadius" min="0" max="32" value="20">
            </div>
        </div>

        <h2>3. 头像与金额高级微调</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>头像尺寸调节</label>
                <input type="range" id="avatarSize" min="100" max="240" value="160">
            </div>
            <div class="form-group">
                <label>头像垂直位置偏移</label>
                <input type="range" id="avatarYOffset" min="-100" max="100" value="0">
            </div>
        </div>

        <div class="form-group switch-row">
            <label>开启金额标注</label>
            <label class="switch"><input type="checkbox" id="amountToggle"><span class="slider"></span></label>
        </div>
        
        <div id="amountPanel" style="display:none" class="grid-2">
            <div class="form-group">
                <label>货币符号</label>
                <select id="currency">
                    <option value="¥">¥ (RMB)</option>
                    <option value="$">$ (USD)</option>
                    <option value="€">€ (EUR)</option>
                </select>
            </div>
            <div class="form-group">
                <label>具体金额</label>
                <input type="text" id="amountVal" value="8.88" placeholder="输入金额">
            </div>
        </div>

        <h2>4. 导出控制</h2>
        <div class="form-group">
            <label>输出尺寸选择</label>
            <select id="outputSize">
                <option value="800">标准 800px</option>
                <option value="1200" selected>高清 1200px</option>
                <option value="2000">超清 2000px</option>
            </select>
        </div>
    </div>

    <div class="panel preview-panel">
        <h2>2. 效果实时预览</h2>
        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
        </div>
        <button class="btn" onclick="downloadImage()">一键高清下载 PNG</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    let qrImage = null, avatarImage = null;

    // 获取DOM节点
    const inputs = ['qrColor','bgColor','borderWidth','borderRadius','avatarSize','avatarYOffset','amountToggle','currency','amountVal','outputSize'];
    const ctrl = {}; inputs.forEach(id => ctrl[id] = document.getElementById(id));

    // 事件绑定
    inputs.forEach(id => ctrl[id].addEventListener('input', render));
    ctrl.amountToggle.addEventListener('change', () => {
        document.getElementById('amountPanel').style.display = ctrl.amountToggle.checked ? 'grid' : 'none';
        render();
    });

    // 拖拽上传核心逻辑
    setupDropZone('qrZone', 'qrInput', img => { qrImage = img; render(); });
    setupDropZone('avatarZone', 'avatarInput', img => { avatarImage = img; render(); });

    function setupDropZone(zoneId, inputId, callback) {
        const zone = document.getElementById(zoneId);
        const input = document.getElementById(inputId);
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#1677ff'; });
        zone.addEventListener('dragleave', () => zone.style.borderColor = '#3b455c');
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.style.borderColor = '#3b455c';
            handleFile(e.dataTransfer.files[0], zone, callback);
        });
        input.addEventListener('change', e => handleFile(e.target.files[0], zone, callback));
    }

    function handleFile(file, zone, callback) {
        if (!file || file.size > 5 * 1024 * 1024) { alert('文件不能超过5MB'); return; }
        zone.innerText = file.name;
        const reader = new FileReader();
        reader.onload = e => { const img = new Image(); img.onload = () => callback(img); img.src = e.target.result; };
        reader.readAsDataURL(file);
    }

    function clearFile(type) {
        document.getElementById(type + 'Input').value = "";
        document.getElementById(type + 'Zone').innerText = "点击或拖拽到这里";
        if (type === 'qr') qrImage = null; else avatarImage = null;
        render();
    }

    function render() {
        const baseW = 1200; const baseH = 1800;
        canvas.width = baseW; canvas.height = baseH;

        // 1. 背景颜色选择适配
        ctx.fillStyle = ctrl.bgColor.value;
        ctx.fillRect(0, 0, baseW, baseH);

        // 2. 顶栏白边
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, baseW, 80);

        // 3. 顶部文字
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 64px system-ui, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("推荐使用支付宝", baseW / 2, 320);

        // 4. 白底容器 (应用圆角和二维码主色)
        const boxW = 860; const boxH = 880;
        const boxX = (baseW - boxW) / 2; const boxY = 460;
        
        ctx.fillStyle = ctrl.qrColor.value; // 使用用户选定的二维码主色填充白盒背景
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxW, boxH, parseInt(ctrl.borderRadius.value));
        ctx.fill();

        // 5. 二维码绘制 (加边框宽度适配)
        if (qrImage) {
            const bW = parseInt(ctrl.borderWidth.value);
            ctx.drawImage(qrImage, boxX + bW, boxY + bW, boxW - (bW*2), boxH - (bW*2));
        }

        // 6. 头像带位置和尺寸微调
        if (avatarImage) {
            const size = parseInt(ctrl.avatarSizeCtrl?.value || ctrl.avatarSize.value);
            const yOffset = parseInt(ctrl.avatarYOffset.value);
            const avaX = baseW / 2;
            const avaY = (boxY + boxH / 2) + yOffset;

            ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(avaX, avaY, (size / 2) + 10, 0, Math.PI * 2); ctx.fill();
            ctx.save(); ctx.beginPath(); ctx.arc(avaX, avaY, size / 2, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(avatarImage, avaX - size/2, avaY - size/2, size, size); ctx.restore();
        }

        // 7. 金额标注显示分支
        if (ctrl.amountToggle.checked) {
            ctx.fillStyle = "#ff4d4f";
            ctx.font = "bold 72px sans-serif";
            ctx.fillText(`${ctrl.currency.value} ${ctrl.amountVal.value}`, baseW / 2, baseH - 400);
        }

        // 底字与能量球
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 52px sans-serif";
        ctx.fillText("支付得蚂蚁森林能量", baseW / 2, baseH - 240);
        drawBubble(boxX + 20, boxY - 10, 65, "能量");
        drawBubble(boxX + boxW - 10, boxY + 120, 75, "能量");
    }

    function drawBubble(x, y, r, text) {
        ctx.save();
        let g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
        g.addColorStop(0, '#a3e76d'); g.addColorStop(1, '#52b324');
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); ctx.restore();
        ctx.fillStyle = "#ffffff"; ctx.font = `bold ${r * 0.5}px sans-serif`; ctx.fillText(text, x, y);
    }

    render();

    function downloadImage() {
        const outSize = parseInt(ctrl.outputSize.value);
        // 创建影子Canvas按输出尺寸精准转换
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = outSize; tempCanvas.height = outSize * 1.5;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

        const link = document.createElement('a');
        link.download = `HD科技_能量码_${outSize}px.png`;
        link.href = tempCanvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>

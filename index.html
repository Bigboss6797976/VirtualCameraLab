<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🌿 能量码生成器 | 支付宝一码多付 · 绿色能量主题</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #d4fc79 0%, #96e6a1 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,240,0.95);
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 25px 45px rgba(0,32,0,0.3), inset 0 1px 2px rgba(255,255,200,0.8);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }
        .hero {
            background: #2c5e2e;
            padding: 20px 20px 12px 20px;
            text-align: center;
            color: #f9f3cf;
            border-bottom: 4px solid #ffeeaa;
        }
        .hero h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 800;
            text-shadow: 2px 2px 0 #1e3a1e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .hero h1 span {
            font-size: 2rem;
        }
        .hero .badge {
            background: #ffdd77;
            color: #1f4f1f;
            display: inline-block;
            border-radius: 60px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 8px;
            box-shadow: inset 0 -1px 0 #b68b40, 0 2px 6px rgba(0,0,0,0.2);
        }
        .preview-area {
            padding: 28px 20px 20px 20px;
            background: #fef9e6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .canvas-wrapper {
            background: #ffffffdd;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 0 0 4px #f9eec1, 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            height: auto;
            background-color: white;
        }
        .tip {
            font-size: 0.75rem;
            background: #e9f7e1;
            padding: 6px 14px;
            border-radius: 60px;
            color: #2b6e2b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .control-panel {
            padding: 8px 24px 28px 24px;
            background: #ffffffea;
            border-radius: 48px 48px 0 0;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #1b4d1b;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #b7dc9c;
            border-radius: 48px;
            font-size: 0.9rem;
            background: #fffff2;
            transition: 0.2s;
            font-family: monospace;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #3a9b3a;
            box-shadow: 0 0 0 3px rgba(58,155,58,0.2);
        }
        .input-group .help {
            font-size: 0.7rem;
            color: #5e8b5e;
            margin-top: 6px;
            margin-left: 12px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0 15px;
        }
        .btn {
            flex: 1;
            background: #3c8c3c;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-secondary {
            background: #5fa05f;
        }
        .btn-download {
            background: #1f6e2f;
        }
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #5f7e4a;
            border-top: 1px dashed #ccddbb;
            padding-top: 16px;
            margin-top: 8px;
        }
        .energy-badge {
            background: #eef5e2;
            border-radius: 40px;
            padding: 6px 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #266b26;
        }
        @media (max-width: 550px) {
            .container { border-radius: 40px; }
            .btn-group { gap: 10px; }
            .btn { font-size: 0.8rem; padding: 10px 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><span>🌱</span> 能量码生成器 <span>💚</span></h1>
        <div class="badge">⚡ 一码多付 · 智能美化 · 即时可用 ⚡</div>
        <div style="margin-top: 10px; font-size:12px; opacity:0.9;">✨ 多人同时扫码支付 ✨</div>
    </div>
    <div class="preview-area">
        <div class="canvas-wrapper">
            <canvas id="energyCanvas" width="500" height="500" style="width:100%; height:auto; max-width:500px; aspect-ratio:1/1"></canvas>
        </div>
        <div class="tip">🌟 实时预览 | 收款码支持支付宝 / 微信 / 任意链接</div>
    </div>
    <div class="control-panel">
        <div class="input-group">
            <label>📱 收款码链接 / 任意文本</label>
            <input type="text" id="paymentLink" placeholder="例如：https://qr.alipay.com/xxxxxxxx 或 微信收款码链接" value="https://qr.alipay.com/fkx1234567890demo">
            <div class="help">🔹 替换成你自己的支付宝/微信收款码链接（支持任何URL或文本，扫码即支付）<br>🔹 多人同时访问本工具，各自生成自己的二维码，互不影响，扫码即可付款给对方！</div>
        </div>
        <div class="input-group">
            <label>🎨 收款文案 (可选)</label>
            <input type="text" id="merchantName" placeholder="商家/昵称" value="绿色能量小铺">
            <div class="help">显示在码上方，增加辨识度</div>
        </div>
        <div class="btn-group">
            <button class="btn" id="refreshBtn">🔄 生成能量码</button>
            <button class="btn btn-download" id="downloadPNG">📥 下载 PNG</button>
            <button class="btn btn-secondary" id="downloadJPG">📸 下载 JPG</button>
        </div>
        <div class="footer-note">
            <div class="energy-badge">💚 支 支付宝 💚  推荐使用支付宝 · 支付得蚂蚁森林能量</div>
            <div style="margin-top:12px;">⚡ 多人同时使用 | 每人独立生成 | 一码通用，扫后支付给指定账户 ⚡</div>
        </div>
    </div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('energyCanvas');
        const ctx = canvas.getContext('2d');
        const paymentInput = document.getElementById('paymentLink');
        const merchantInput = document.getElementById('merchantName');
        const refreshBtn = document.getElementById('refreshBtn');
        const downloadPNG = document.getElementById('downloadPNG');
        const downloadJPG = document.getElementById('downloadJPG');
        const SIZE = 500;
        canvas.width = SIZE;
        canvas.height = SIZE;
        let qrCodeSize = 280;
        let qrCodeX = (SIZE - qrCodeSize) / 2;
        let qrCodeY = 120;
        let currentQRImage = null;
        
        function generateQRImage(text, size) {
            return new Promise((resolve, reject) => {
                if (!text || text.trim() === "") {
                    reject(new Error("内容不能为空"));
                    return;
                }
                const tempDiv = document.createElement('div');
                tempDiv.style.position = 'absolute';
                tempDiv.style.top = '-9999px';
                tempDiv.style.left = '-9999px';
                document.body.appendChild(tempDiv);
                try {
                    const qr = new QRCode(tempDiv, {
                        text: text,
                        width: size,
                        height: size,
                        colorDark: "#1a3a1a",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                    let qrCanvas = tempDiv.querySelector('canvas');
                    if (!qrCanvas) {
                        const img = tempDiv.querySelector('img');
                        if(img) {
                            const offCanvas = document.createElement('canvas');
                            offCanvas.width = size;
                            offCanvas.height = size;
                            const offCtx = offCanvas.getContext('2d');
                            offCtx.drawImage(img, 0, 0, size, size);
                            qrCanvas = offCanvas;
                        } else {
                            throw new Error("二维码生成失败");
                        }
                    }
                    const imgObj = new Image();
                    imgObj.onload = () => {
                        document.body.removeChild(tempDiv);
                        resolve(imgObj);
                    };
                    imgObj.onerror = () => {
                        document.body.removeChild(tempDiv);
                        reject(new Error("二维码图像渲染失败"));
                    };
                    imgObj.src = qrCanvas.toDataURL('image/png');
                } catch (err) {
                    document.body.removeChild(tempDiv);
                    reject(err);
                }
            });
        }
        
        async function drawEnergyCode() {
            let qrText = paymentInput.value.trim();
            if (!qrText) {
                qrText = "https://qr.alipay.com/fallback";
                paymentInput.value = qrText;
            }
            const merchant = merchantInput.value.trim() || "能量收款";
            ctx.clearRect(0, 0, SIZE, SIZE);
            ctx.fillStyle = "#eef5e2";
            ctx.fillRect(0, 0, SIZE, SIZE);
            ctx.font = "bold 24px 'Segoe UI'";
            ctx.fillStyle = "#2c6e2c";
            ctx.fillText("⚡ 生成中...", 150, 260);
            try {
                const qrImg = await generateQRImage(qrText, 280);
                currentQRImage = qrImg;
                drawFullEnergyDesign(qrImg, merchant, qrText);
            } catch (err) {
                console.error(err);
                ctx.clearRect(0, 0, SIZE, SIZE);
                ctx.fillStyle = "#ffe1c4";
                ctx.fillRect(0, 0, SIZE, SIZE);
                ctx.fillStyle = "#b33";
                ctx.font = "18px system-ui";
                ctx.fillText("⚠️ 链接无效，请重新输入", 100, 250);
                ctx.font = "14px system-ui";
                ctx.fillStyle = "#486848";
                ctx.fillText("支持支付宝/微信收款链接或任意文本", 100, 320);
            }
        }
        
        function drawFullEnergyDesign(qrImage, merchantName, linkBrief) {
            ctx.clearRect(0, 0, SIZE, SIZE);
            const grad = ctx.createLinearGradient(0, 0, SIZE, SIZE);
            grad.addColorStop(0, '#c3e8a7');
            grad.addColorStop(0.5, '#aad68d');
            grad.addColorStop(1, '#82c46a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, SIZE, SIZE);
            for (let i = 0; i < 80; i++) {
                ctx.beginPath();
                let x = (i * 131) % SIZE;
                let y = (i * 253) % SIZE;
                let r = 2 + (i % 6);
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 245, 150, ${0.2 + (i % 3) * 0.1})`;
                ctx.fill();
            }
            ctx.shadowColor = "rgba(0,0,0,0.1)";
            ctx.shadowBlur = 12;
            ctx.fillStyle = "#fffff6";
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.beginPath();
            ctx.roundRect(20, 20, SIZE - 40, SIZE - 40, 40);
            ctx.fill();
            ctx.shadowColor = "transparent";
            ctx.font = "bold 32px 'KaiTi','PingFang SC','Noto Sans CJK SC'";
            ctx.fillStyle = "#1d6b2b";
            ctx.fillText("支", 50, 80);
            ctx.font = "bold 28px system-ui";
            ctx.fillStyle = "#0f5225";
            ctx.fillText("支付宝", 108, 78);
            ctx.font = "500 16px system-ui";
            ctx.fillStyle = "#d68b2c";
            ctx.fillText("推荐使用支付宝", SIZE - 170, 68);
            ctx.beginPath();
            ctx.arc(SIZE/2, qrCodeY + qrCodeSize/2 + 8, qrCodeSize/2 + 18, 0, Math.PI*2);
            ctx.strokeStyle = "#a2da6e";
            ctx.lineWidth = 6;
            ctx.setLineDash([8, 12]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(SIZE/2, qrCodeY + qrCodeSize/2 + 8, qrCodeSize/2 + 8, 0, Math.PI*2);
            ctx.strokeStyle = "#ffdf88";
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.drawImage(qrImage, qrCodeX, qrCodeY, qrCodeSize, qrCodeSize);
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#5cb85c";
            for (let corner of [[qrCodeX-8, qrCodeY-8], [qrCodeX+qrCodeSize-12, qrCodeY-8], [qrCodeX-8, qrCodeY+qrCodeSize-12], [qrCodeX+qrCodeSize-12, qrCodeY+qrCodeSize-12]]) {
                ctx.beginPath();
                ctx.moveTo(corner[0], corner[1]+6);
                ctx.quadraticCurveTo(corner[0]+4, corner[1]-2, corner[0]+12, corner[1]+4);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(corner[0]+6, corner[1]);
                ctx.quadraticCurveTo(corner[0]+12, corner[1]-4, corner[0]+14, corner[1]+6);
                ctx.fill();
            }
            ctx.font = "600 18px 'Segoe UI'";
            ctx.fillStyle = "#327a32";
            ctx.fillText(`⚡ ${merchantName} ⚡`, qrCodeX + 70, qrCodeY - 12);
            ctx.font = "500 15px system-ui";
            ctx.fillStyle = "#2a6333";
            ctx.fillText("📱 打开支付宝[扫一扫]", qrCodeX + 40, qrCodeY + qrCodeSize + 28);
            ctx.font = "bold 16px system-ui";
            ctx.fillStyle = "#b45f1b";
            ctx.fillText("🌿 支付得蚂蚁森林能量 🌿", qrCodeX + 55, qrCodeY + qrCodeSize + 54);
            ctx.fillStyle = "#509e2c";
            ctx.beginPath();
            ctx.roundRect(40, SIZE - 55, SIZE - 80, 28, 30);
            ctx.fill();
            ctx.fillStyle = "#fff1b0";
            ctx.font = "bold 13px system-ui";
            ctx.fillText("💚 绿色能量 · 一码多付 💚", SIZE/2-100, SIZE-36);
            let shortLink = linkBrief.length > 28 ? linkBrief.substring(0, 25)+"..." : linkBrief;
            ctx.font = "10px monospace";
            ctx.fillStyle = "#657f4b";
            ctx.fillText(`收款码: ${shortLink}`, 40, SIZE-16);
            for (let s=0; s<18; s++) {
                ctx.beginPath();
                let sx = 30 + (s*47) % (SIZE-60);
                let sy = 15 + (s*83) % 70;
                ctx.moveTo(sx, sy-3);
                ctx.lineTo(sx+2, sy-1);
                ctx.lineTo(sx+5, sy);
                ctx.lineTo(sx+2, sy+1);
                ctx.lineTo(sx, sy+3);
                ctx.lineTo(sx-2, sy+1);
                ctx.lineTo(sx-5, sy);
                ctx.lineTo(sx-2, sy-1);
                ctx.fillStyle = `rgba(253, 235, 120, 0.9)`;
                ctx.fill();
            }
        }
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        function downloadImage(type = 'png') {
            if (!currentQRImage && paymentInput.value) {
                drawEnergyCode().then(() => {
                    setTimeout(() => triggerDownload(type), 100);
                }).catch(() => alert("请填写有效链接后重试"));
                return;
            } else if (!currentQRImage && !paymentInput.value) {
                alert("请填写支付宝/微信收款链接");
                return;
            }
            triggerDownload(type);
        }
        
        function triggerDownload(type) {
            try {
                const mimeType = type === 'png' ? 'image/png' : 'image/jpeg';
                const extension = type === 'png' ? 'png' : 'jpg';
                const link = document.createElement('a');
                link.download = `energy_code_${Date.now()}.${extension}`;
                link.href = canvas.toDataURL(mimeType, 0.95);
                link.click();
            } catch(e) {
                alert("导出失败，可刷新页面重试");
            }
        }
        
        let debounceTimer;
        function autoRefresh() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                drawEnergyCode();
            }, 280);
        }
        
        paymentInput.addEventListener('input', autoRefresh);
        merchantInput.addEventListener('input', autoRefresh);
        refreshBtn.addEventListener('click', () => { drawEnergyCode(); });
        downloadPNG.addEventListener('click', () => downloadImage('png'));
        downloadJPG.addEventListener('click', () => downloadImage('jpeg'));
        drawEnergyCode().catch(console.warn);
        canvas.addEventListener('touchstart', (e) => e.preventDefault());
    })();
</script>
</body>
</html>

<h1>Energy Code Generator</h1>
<div class="container">
    <div class="panel">
        <h2>参数配置</h2>
        <div class="form-group">
            <label>1. 上传收款二维码</label>
            <input type="file" id="qrInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>2. 自定义中心头像</label>
            <input type="file" id="avatarInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>头像大小缩放 (px)</label>
            <input type="range" id="avatarSize" min="40" max="120" value="70">
        </div>
        <div class="form-group">
            <label>二维码主题色</label>
            <select id="qrColor">
                <option value="#4682B4">钢青 (Steel Blue)</option>
                <option value="#D1E231">酸黄 (Acid Yellow)</option>
                <option value="#00FFFF">青色 (Cyan)</option>
                <option value="#FFFFFF">白色 (White)</option>
                <option value="#FF0000">红色 (Red)</option>
                <option value="#1A1B26">深色 (Dark)</option>
            </select>
        </div>
        <div class="form-group">
            <label>边框宽度 (px)</label>
            <input type="range" id="borderWidth" min="0" max="24" value="6">
        </div>
        <div class="form-group">
            <label>圆角大小 (px)</label>
            <input type="range" id="borderRadius" min="0" max="32" value="16">
        </div>
        <div class="form-group">
            <label>输出尺寸选择</label>
            <select id="outputSize">
                <option value="800">标准 (800px)</option>
                <option value="1200" selected>高清 (1200px)</option>
                <option value="2000">超清 (2000px)</option>
            </select>
        </div>
    </div>

    <div class="panel preview-panel">
        <h2>4. Live Preview</h2>
        <canvas id="mainCanvas"></canvas>
        <div class="btn-group">
            <button class="btn" onclick="downloadImage('png')">Download PNG</button>
            <button class="btn" style="background:#565f89;" onclick="downloadImage('jpeg')">Download JPG</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    let qrImage = null;
    let avatarImage = null;

    const qrInput = document.getElementById('qrInput');
    const avatarInput = document.getElementById('avatarInput');
    const avatarSizeCtrl = document.getElementById('avatarSize');
    const qrColorCtrl = document.getElementById('qrColor');
    const borderWidthCtrl = document.getElementById('borderWidth');
    const borderRadiusCtrl = document.getElementById('borderRadius');
    const outputSizeCtrl = document.getElementById('outputSize');

    [avatarSizeCtrl, qrColorCtrl, borderWidthCtrl, borderRadiusCtrl, outputSizeCtrl].forEach(ctrl => {
        ctrl.addEventListener('input', render);
    });

    qrInput.addEventListener('change', (e) => { handleFile(e, img => { qrImage = img; render(); })});
    avatarInput.addEventListener('change', (e) => { handleFile(e, img => { avatarImage = img; render(); })});

    function handleFile(e, callback) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() { callback(img); };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function render() {
        const size = parseInt(outputSizeCtrl.value);
        canvas.width = size;
        canvas.height = size * 1.5;

        ctx.fillStyle = "#1677ff"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, size * 0.25);

        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${size * 0.06}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText("推荐使用支付宝", canvas.width / 2, size * 0.45);

        const qrBoxSize = size * 0.65;
        const qrBoxX = (canvas.width - qrBoxSize) / 2;
        const qrBoxY = size * 0.55;
        
        ctx.fillStyle = "#ffffff";
        const radius = parseInt(borderRadiusCtrl.value) * (size / 800);
        ctx.beginPath();
        ctx.roundRect(qrBoxX, qrBoxY, qrBoxSize, qrBoxSize, radius);
        ctx.fill();

        if (qrImage) {
            const bWidth = parseInt(borderWidthCtrl.value) * (size / 800);
            ctx.drawImage(qrImage, qrBoxX + bWidth, qrBoxY + bWidth, qrBoxSize - bWidth*2, qrBoxSize - bWidth*2);
        } else {
            ctx.fillStyle = "#e5e5e5";
            ctx.fillRect(qrBoxX + 20, qrBoxY + 20, qrBoxSize - 40, qrBoxSize - 40);
            ctx.fillStyle = "#999999";
            ctx.font = `${size * 0.03}px sans-serif`;
            ctx.fillText("请上传收款二维码", canvas.width / 2, qrBoxY + qrBoxSize / 2);
        }

        if (avatarImage) {
            const avaSize = parseInt(avatarSizeCtrl.value) * (size / 800);
            const avaX = (canvas.width - avaSize) / 2;
            const avaY = qrBoxY + (qrBoxSize - avaSize) / 2;

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.roundRect(avaX - 6, avaY - 6, avaSize + 12, avaSize + 12, 10);
            ctx.fill();

            ctx.save();
            ctx.beginPath();
            ctx.roundRect(avaX, avaY, avaSize, avaSize, 8);
            ctx.clip();
            ctx.drawImage(avatarImage, avaX, avaY, avaSize, avaSize);
            ctx.restore();
        }

        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${size * 0.045}px sans-serif`;
        ctx.fillText("支付得蚂蚁森林能量", canvas.width / 2, canvas.height - (size * 0.15));

        drawEnergyBubble(qrBoxX, qrBoxY, size * 0.04);
        drawEnergyBubble(qrBoxX + qrBoxSize, qrBoxY + size*0.1, size * 0.05);
        drawEnergyBubble(qrBoxX + qrBoxSize, qrBoxY + qrBoxSize - size*0.05, size * 0.045);
    }

    function drawEnergyBubble(x, y, r) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = "#72d53f";
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.font = `${r * 0.6}px sans-serif`;
        ctx.fillText("能量", x, y + r*0.2);
    }

    function downloadImage(format) {
        const ext = format === 'jpeg' ? 'jpg' : 'png';
        const link = document.createElement('a');
        link.download = `energy_code_${Date.now()}.${ext}`;
        link.href = canvas.toDataURL(`image/${format}`);
        link.click();
    }

    render();
</script>
